<!DOCTYPE html>
  <html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>
            BDP
        </title>
    </head>
    <body>
     <form>
       <marquee>Edit by Badhon Dey Pappu </marquee>
      <h1 style="text-align: center;">Sign up Form</h1>
     <hr>
     <br>
     <label for="user">Name: </label>
     <input type="text" name="user" placeholder="User Name"> <br>
      <label for="email">Email: </label>
      <input type="email" id="email" name="usermail" placeholder="User Mail" required><br>
      <label for="pass">Password:</label>
      <input type="password" id="pass" name:"password" placeholder="Password">
      <br>
      <label for="phn">Phone: </label>
      <br>
      <select name="code">
        <option value="+880">+880</option>
        <option value="+990">+990</option>
        <option value="+110">+110</option>
      </select>
      <input type="number" id="phn" name="Phone" placeholder="123456789" required>
      <br>
      <label for="country" >
        Country</label>
        <input list="con">
        <datalist id="con">
          <option value="India"></option>
          <option value="Japan"></option>
          <option value="Bangladesh"></option>
        </datalist>
      <br>
      Gender: 
      <input type="radio" id="gnd1" name="Gender">
      <label for="gnd1">Male</label>
      <input type="radio" id="gnd2" name="Gender">
      <label for="gnd2">Female</label>
      <input type="radio" id="gnd3" name="Gender">
      <label for="gnd3">Others</label>
      <br>
      <label for="date">Date of Birth</label>
      <input type="date" id="date" name="dob">
      <br> 
      <label for="time">Time:</label>
      <input type="time" id="time" name="tm">
      <br>
      <label for="colors">Colors</label>
      <input type="color" id="colors" name="col">
      <br>
      <label for="file">Choose Photo:
      </label>
      <input type="file" id="file" name="f1">
      <br>
      <input type="checkbox" id="vehiclel" name="vec">
      <label for="vehiclel"> I have a Bike</label>
      <input type="checkbox" id="vehiclel2" name="vec">
      <label for="vehiclel2"> I have a Bycycle</label>
      <br>
      <textarea name="comment" cols="10" rows="10">
        Comment Here:
      </textarea>
      <br>
      <input type="submit" value="send">
      <input type="reset" value="reset">
     </form>
    </body>
  </html>
